name: 1 - Continuous Integration
run-name: "${{ github.workflow }}"

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  WEB_IMAGE_NAME: secure-doc-platform-web
  DB_IMAGE_NAME: secure-doc-platform-db

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start application stack for validation
        run: |
          docker compose up -d --build

      - name: Wait for application
        run: |
          timeout=60
          elapsed=0

          until curl -fs http://localhost:8000/health > /dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Application did not become ready within ${timeout}s"
              exit 1
            fi

            echo "Waiting for application..."
            sleep 2
            elapsed=$((elapsed+2))
          done

          echo "Application is ready"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run smoke tests
        run: |
          pytest -q tests/test_smoke.py

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v --remove-orphans

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install 'bandit[sarif]>=1.7.5'
      - name: Run Bandit
        id: bandit
        continue-on-error: true
        run: |
          bandit -r web/ -f sarif -o bandit-results.sarif
      - name: Upload Bandit SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit
      - name: Archive Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.sarif  

  semgrep:
    name: Semgrep (multi-language SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep ci \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \
            --config p/github-actions \
            --sarif --output semgrep-results.sarif
        env:
          SEMGREP_RULES: ""
      - name: Upload Semgrep SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
      - name: Archive Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  safety:
    name: Safety (Python dependencies)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Safety
        run: |
          python -m pip install --upgrade pip
          pip install safety
      - name: Run Safety check on requirements.txt
        id: safety
        continue-on-error: true
        run: |
          safety check --file=web/requirements.txt --output text | tee safety-results.txt
      - name: Archive Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-results
          path: safety-results.txt         

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image namespace
        run: |
          echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          echo "WEB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "DB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.WEB_SHA_TAG }}
          provenance: false

      - name: Build and push db image
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: |
            ${{ env.DB_SHA_TAG }}
          provenance: false
